version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_grant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otel-collector.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector.yml:/etc/otel-collector.yml
    depends_on:
      - prometheus
      - jaeger

  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  jaeger:
    image: jaegertracing/all-in-one:1.64
    ports:
      - "16686:16686"
      - "14250:14250"

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    entrypoint: ["go", "run", "./scripts/migrate.go", "up"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/smart_grant?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      CONFIG_PATH: /app/configs
      APP_ENV: production
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../configs:/app/configs

  api-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    ports:
      - "8081:8081"
    environment:
      CONFIG_PATH: /app/configs
      APP_ENV: production
    depends_on:
      - backend

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    environment:
      CONFIG_PATH: /app/configs
      APP_ENV: production
    depends_on:
      - backend

volumes:
  pgdata:
  minio_data:
